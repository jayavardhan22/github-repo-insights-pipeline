name: Daily GitHub Insights Pipeline

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create GCP credentials file
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
        run: |
          mkdir -p config
          echo "$GCP_SA_KEY_JSON" > config/github-insights-pipeline.json
          python -c "import json; json.load(open('config/github-insights-pipeline.json')); print('SA JSON OK')"

      - name: Run Pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: config/github-insights-pipeline.json
          GOOGLE_APPLICATION_CREDENTIALS: config/github-insights-pipeline.json
        run: |
          python src/main.py